name: Build Super CircuitoApp APK

on:
  push:
    branches: [ main ] # Se activa al subir cambios a la rama principal

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/assets --save-dev

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          # Esto copia tu index-2.html a la carpeta que Capacitor espera
          cp index-2.html www/index.html

      - name: Generate Resources & Sync
        run: |
          npx cap add android
          # Genera iconos automáticamente desde tu carpeta resources/
          npx capacitor-assets generate --android
          npx cap sync android

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SuperCircuito-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

